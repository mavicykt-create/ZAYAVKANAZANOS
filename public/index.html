<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Минимальный сайт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
      width: calc(100% - 32px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Сайт работает</h1>
    <p>Это минимальная тестовая страница без лишней логики.</p>
  </div>
</body>
</html>
